<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nap · Ledger Overview</title>
<link rel="icon" type="image/png" href="nap.png">
<script src="index_script_logindata.js"></script>
<script src="ledgerView_script.js"></script>
<script src="nostr_tools.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f0; --surface: #ffffff; --border: #dddbd4;
  --text: #1a1917; --text2: #6b6860; --text3: #a09e98;
  --accent: #6d28d9; --accent-light: #ede9fe;
  --mono: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace;
  --max: 560px;
}
body { background:var(--bg); color:var(--text); font-family:var(--mono); font-size:14px; line-height:1.6; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:0 16px 48px; }
.site-header { width:100%; max-width:var(--max); padding:28px 0 20px; border-bottom:1px solid var(--border); margin-bottom:28px; display:flex; align-items:center; gap:14px; }
.site-logo { font-size:18px; font-weight:600; color:var(--text); text-decoration:none; letter-spacing:-0.5px; }
.site-logo span { color:var(--accent); }
.nap-img { display:block; max-width:70px; opacity:0.65; }
.page { width:100%; max-width:var(--max); display:flex; flex-direction:column; gap:24px; }
.back-link { font-size:12px; color:var(--text3); text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
.back-link:hover { color:var(--accent); }
.section-label { font-size:10px; text-transform:uppercase; letter-spacing:1.2px; color:var(--text3); margin-bottom:10px; }
.status-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.status-row { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border); font-size:12px; }
.status-row:last-child { border-bottom:none; }
.status-dot { width:7px; height:7px; border-radius:50%; background:var(--border); flex-shrink:0; }
.status-dot.on { background:var(--accent); }
.status-key { color:var(--text3); width:80px; flex-shrink:0; }
.status-val { color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.status-val.active { color:var(--accent); }

/* empty state */
.empty-state { background:var(--surface); border:1px dashed var(--border); border-radius:8px; padding:36px 20px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:8px; }
.empty-icon { font-size:24px; opacity:0.3; }
.empty-text { font-size:12px; color:var(--text3); }
.empty-link { font-size:12px; color:var(--accent); text-decoration:none; }
.empty-link:hover { text-decoration:underline; }

/* ledger content */
.card { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.card-header { padding:12px 16px; border-bottom:1px solid var(--border); font-size:12px; font-weight:500; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; }
.card-body { padding:0; }

.meta-row { display:flex; gap:10px; padding:10px 16px; border-bottom:1px solid var(--border); font-size:12px; align-items:baseline; }
.meta-row:last-child { border-bottom:none; }
.meta-key { color:var(--text3); width:110px; flex-shrink:0; }
.meta-val { color:var(--text); word-break:break-all; }

/* list sections */
.list-section { border-top:1px solid var(--border); }
.list-header { padding:10px 16px; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text3); background:var(--bg); display:flex; justify-content:space-between; align-items:center; }
.list-count { font-size:10px; color:var(--text3); }
.list-item { display:flex; align-items:baseline; gap:8px; padding:8px 16px; border-bottom:1px solid var(--border); font-size:12px; }
.list-item:last-child { border-bottom:none; }
.list-id { color:var(--text3); font-size:10px; flex-shrink:0; }
.list-name { color:var(--text2); }
.list-desc { color:var(--text3); font-size:11px; margin-left:auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px; }
.list-empty { padding:10px 16px; font-size:12px; color:var(--text3); font-style:italic; }

.tag { display:inline-block; background:var(--accent-light); color:var(--accent); border-radius:3px; padding:1px 7px; font-size:11px; margin:1px; }
</style>
</head>
<body>

<header class="site-header">
  <a class="site-logo" href="index.html">nap<span>_</span></a>
  <!-- <img src="nap.png" alt="nap logo" class="nap-img"> -->
</header>

<main class="page">

  <a class="back-link" href="ledger.html">← back</a>

  <div>
    <div class="section-label">Current Session</div>
    <div class="status-card">
      <div class="status-row">
        <span class="status-dot" id="accountantDot"></span>
        <span class="status-key">accountant</span>
        <span class="status-val" id="accountantVal">not logged in</span>
      </div>
      <div class="status-row">
        <span class="status-dot" id="ledgerDot"></span>
        <span class="status-key">ledger</span>
        <span class="status-val" id="ledgerVal">not selected</span>
      </div>
    </div>
  </div>

  <div>
    <div class="section-label">View Ledger · kind 37701</div>
    <div id="ledgerContent">
      <div class="empty-state">
        <div class="empty-icon">⊟</div>
        <div class="empty-text">No ledger selected.</div>
        <a class="empty-link" href="loginLedger.html">Select a ledger →</a>
      </div>
    </div>
  </div>
  <img src="nap.png" alt="nap logo" class="nap-img">
</main>

<script>
function renderList(items, emptyMsg) {
  if (!items || !items.length) {
    return `<div class="list-empty">${emptyMsg}</div>`;
  }
  return items.map(item =>
    `<div class="list-item">
      <span class="list-id">${item.id || ''}</span>
      <span class="list-name">${item.name || '—'}</span>
      ${item.description ? `<span class="list-desc">${item.description}</span>` : ''}
    </div>`
  ).join('');
}

function renderLedger(ledgerEv) {
  console.log("renderLedger called.");
  console.log("To be rendered ledger event content: ");
  let meta = JSON.parse(ledgerEv.content);
  console.log(meta);
  let pkAdmin = NostrTools.nip19.npubEncode(ledgerEv.pubkey);
  //let pkShortAdmin = pkAdmin.slice(0,8) + "..." + pkAdmin.slice(-8);
  const date = new Date(ledgerEv.created_at * 1000);
  const yyyy = date.getFullYear();
  const mm = String(date.getMonth() + 1).padStart(2, '0'); // months are 0-indexed
  const dd = String(date.getDate()).padStart(2, '0');
  
  const units = (meta.acc_units || []).map(u => `<span class="tag">${u}</span>`).join('') || '—';
  
  document.getElementById('ledgerContent').innerHTML = `
    <div class="card">
      <div class="card-header">Ledger Details</div>
      <div class="card-body">

        <div class="meta-row">
          <span class="meta-key">name</span>
          <span class="meta-val">${meta.name || '—'}</span>
        </div>
        ${meta.description ? `
        <div class="meta-row">
          <span class="meta-key">description</span>
          <span class="meta-val">${meta.description}</span>
        </div>` : ''}
        <div class="meta-row">
          <span class="meta-key">admin</span>
          <span class="meta-val">${pkAdmin || '—'}</span>
        </div>
        <div class="meta-row">
          <span class="meta-key">last update</span>
          <span class="meta-val">${`${yyyy}/${mm}/${dd}` || '—'}</span>
        </div>
        <div class="meta-row">
          <span class="meta-key">units</span>
          <span class="meta-val">${units}</span>
        </div>

        <div class="list-section">
          <div class="list-header">
            Ledger Accounts
            <span class="list-count">${(meta.acc_accounts||[]).length}</span>
          </div>
          ${renderList(meta.acc_accounts, 'no accounts defined')}
        </div>

        <div class="list-section">
          <div class="list-header">
            Ledger Movement Types
            <span class="list-count">${(meta.acc_mvt_types||[]).length}</span>
          </div>
          ${renderList(meta.acc_mvt_types, 'no movement types defined')}
        </div>

        <div class="list-section">
          <div class="list-header">
            Ledger Accounting Partners
            <span class="list-count">${(meta.acc_partners||[]).length}</span>
          </div>
          ${renderList(meta.acc_partners, 'no partners defined')}
        </div>

        <div class="list-section">
          <div class="list-header">
            Ledger Accountants
            <span class="list-count">${(meta.acc_accountants||[]).length}</span>
          </div>
          ${renderList(meta.acc_accountants, 'no accountants defined')}
        </div>

        <div class="list-section">
          <div class="list-header">
            Ledger Posting Rules
            <span class="list-count">${(meta.acc_rules||[]).length}</span>
          </div>
          ${renderList(meta.acc_rules, 'no rules defined')}
        </div>

      </div>
    </div>`;
}

updateStatus();
updateStatus2();
</script>
</body>
</html>
