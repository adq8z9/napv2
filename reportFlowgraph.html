*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {

body { background:var(--bg); color:var(--text); font-family:var(--mono); font-size:14px; line-height:1.6; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:0 16px 48px; }

.site-logo span { color:var(--accent); }
.page { width:100%; max-width:var(--max); display:flex; flex-direction:column; gap:24px; }
.back-link { font-size:12px; color:var(--text3); text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
.back-link:hover { color:var(--accent); }
.section-label { font-size:10px; text-transform:uppercase; letter-spacing:1.2px; color:var(--text3); margin-bottom:10px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.card-header { padding:12px 16px; border-bottom:1px solid var(--border); font-size:12px; font-weight:500; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; display:flex; justify-content:space-between; align-items:center; }
.card-body { padding:0; }

/* graph container */
#graph { width:100%; height:420px; background:var(--bg); }

/* toolbar */
.toolbar { display:flex; gap:8px; padding:12px 16px; border-bottom:1px solid var(--border); flex-wrap:wrap; align-items:center; }
.btn { font-family:var(--mono); font-size:11px; padding:4px 10px; border:1px solid var(--border); border-radius:4px; background:var(--surface); color:var(--text2); cursor:pointer; letter-spacing:0.3px; }
.btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }
/*.toolbar-hint { font-size:11px; color:var(--text3); margin-left:auto; }*/
.toolbar-hint { font-size:11px; color:var(--text3); }

/* entry form */
.entry-form { padding:12px 16px; border-bottom:1px solid var(--border); background:var(--bg); display:none; }
.form-row { display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:8px; align-items:end; }
.form-field label { display:block; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text3); margin-bottom:4px; }
.form-field input { font-family:var(--mono); font-size:12px; width:100%; padding:5px 8px; border:1px solid var(--border); border-radius:4px; background:var(--surface); color:var(--text); outline:none; }
.form-field input:focus { border-color:var(--accent); }
.btn-add { font-family:var(--mono); font-size:11px; padding:5px 12px; border:1px solid var(--accent); border-radius:4px; background:var(--accent-light); color:var(--accent); cursor:pointer; white-space:nowrap; align-self:end; }
.btn-add:hover { background:var(--accent); color:#fff; }

/* entry list */
.list-section { border-top:1px solid var(--border); }
.list-header { padding:8px 16px; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text3); background:var(--bg); display:flex; justify-content:space-between; align-items:center; }
.list-count { font-size:10px; color:var(--text3); }
.list-item { display:flex; align-items:baseline; gap:8px; padding:7px 16px; border-bottom:1px solid var(--border); font-size:12px; }
.list-item:last-child { border-bottom:none; }
.list-debit { color:var(--accent); }
.list-credit { color:var(--text2); }
.list-amount { color:var(--text3); font-size:11px; margin-left:auto; }
.list-arrow { color:var(--text3); font-size:11px; }
.list-remove { color:var(--text3); font-size:11px; cursor:pointer; text-decoration:none; margin-left:8px; }
.list-remove:hover { color:var(--accent); }
.list-empty { padding:10px 16px; font-size:12px; color:var(--text3); font-style:italic; }
.tag { display:inline-block; background:var(--accent-light); color:var(--accent); border-radius:3px; padding:1px 7px; font-size:11px; margin:1px; }
.status-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.status-row { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border); font-size:12px; }
.status-row:last-child { border-bottom:none; }
.status-dot { width:7px; height:7px; border-radius:50%; background:var(--border); flex-shrink:0; }
.status-dot.on { background:var(--accent); }
.status-key { color:var(--text3); width:80px; flex-shrink:0; }
.status-val { color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.status-val.active { color:var(--accent); }

<script>
const ACCENT       = '#6d28d9';
const ACCENT_LIGHT = '#ede9fe';
const BORDER       = '#dddbd4';
const TEXT2        = '#6b6860';
const TEXT3        = '#a09e98';
const BG           = '#f5f4f0';
const MONO         = "ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace";

let entries = [];

let network;

function buildGraph() {
  console.log("buildGraph called.");
  const flowMap = {};
  let entryEventsString = localStorage.getItem("liEntryEvents");
  let entries = JSON.parse(entryEventsString);
  console.log(entries);
  entries.forEach(e => {
    let ep = JSON.parse(e.content);
    console.log(ep);
    const key = ep.credit_account + '|||' + ep.debit_account;
    flowMap[key] = (flowMap[key] || 0) + (ep.acc_amount[0]);
  });

  const accountSet = new Set();
  entries.forEach(e => { let ep = JSON.parse(e.content); accountSet.add(ep.debit_account); accountSet.add(ep.credit_account); });

  const nodeArr = [...accountSet].map(name => ({
    id: name,
    label: name,
    shape: 'box',
    color: { background: ACCENT_LIGHT, border: ACCENT, highlight: { background: ACCENT_LIGHT, border: ACCENT } },
    font: { color: ACCENT, size: 13, face: MONO },
    margin: { top: 7, bottom: 7, left: 12, right: 12 },
    borderWidth: 1,
  }));

  const maxFlow = Math.max(...Object.values(flowMap));
  const edgeArr = Object.entries(flowMap).map(([key, total]) => {
    const [from, to] = key.split('|||');
    console.log(key);
    console.log(from);
    console.log(to);
    console.log(total);
    return {
      from, to,
      arrows: { to: { enabled: true, scaleFactor: 0.7 } },
      label: total.toLocaleString(),
      color: { color: BORDER, highlight: ACCENT },
      font: { color: TEXT3, size: 11, face: MONO, align: 'middle', strokeWidth: 0 },
      width: 1 + Math.round((total / maxFlow) * 3),
      smooth: { type: 'curvedCW', roundness: 0.15 },
    };
  });

  const nodes = new vis.DataSet(nodeArr);
  const edges = new vis.DataSet(edgeArr);

  const options = {
    layout: { hierarchical: { direction: 'LR', sortMethod: 'directed', levelSeparation: 170, nodeSpacing: 80 } },
    physics: false,
    interaction: { hover: true, tooltipDelay: 200 },
    nodes: { borderWidthSelected: 2 },
  };

  if (network) network.destroy();
  network = new vis.Network(document.getElementById('graph'), { nodes, edges }, options);
}
